<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Forge logo">
  <defs>
    <linearGradient id="forge-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#E2552A"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="64" height="64" rx="14" ry="14" fill="url(#forge-bg)"/>
  <!-- Stylized "F" monogram. Top crossbar slightly tapered, middle bar shorter,
       leaving a clean negative space that reads as both an F and a small flame. -->
  <path d="M19 14 H46 V22 H27 V30 H42 V38 H27 V50 H19 Z" fill="#FFFFFF"/>
  <!-- Small spark dot above the F to evoke "forge" without being literal. -->
  <circle cx="50" cy="14" r="3" fill="#FFFFFF" opacity="0.9"/>
</svg>
